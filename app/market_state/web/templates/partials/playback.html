<div class="playback-panel">
    <button id="step-backward-button" type="button">
        Step Back
    </button>

    <button id="play-button" type="button">
        Play
    </button>

    <button id="pause-button" type="button">
        Pause
    </button>

    <button id="step-forward-button" type="button">
        Step Forward
    </button>

    <button id="live-mode-button" type="button">
        Live Mode
    </button>

    <button id="stop-live-button" type="button">
        Stop Live
    </button>

    <button id="speed-1x-button" type="button">
        1x
    </button>

    <button id="speed-5x-button" type="button">
        5x
    </button>

    <button id="speed-20x-button" type="button">
        20x
    </button>

    <button id="speed-100x-button" type="button">
        100x
    </button>

    <span>
        Frame:
        <strong id="replay-index">0 / 0</strong>
    </span>

    <span>
        Speed:
        <strong id="replay-speed">500ms</strong>
    </span>
</div>
