<!DOCTYPE html>
<html>
<head>
    <title>Status Dashboard</title>

    <meta http-equiv="refresh" content="5">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 30px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .card-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .status-card {
            background: white;
            padding: 20px;
            width: 220px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .card-value {
            font-size: 36px;
            font-weight: bold;
        }

        .online {
            color: green;
        }

        .offline {
            color: red;
        }
    </style>
</head>

<body>

    <h1>System Status</h1>

    <div class="card-container">

        <div class="status-card">
            <div class="card-title">Quotes Stored</div>
            <div class="card-value">{{ quote_count }}</div>
        </div>

        <div class="status-card">
            <div class="card-title">Alerts Generated</div>
            <div class="card-value">{{ alert_count }}</div>
        </div>

        <div class="status-card">
            <div class="card-title">Streamer Status</div>

            <div class="card-value
                {% if streamer_status == 'ONLINE' %}
                    online
                {% else %}
                    offline
                {% endif %}
            ">
                {{ streamer_status }}
            </div>
        </div>

        <div class="status-card">
            <div class="card-title">Symbols Tracked</div>
            <div class="card-value">{{ symbols_tracked }}</div>
        </div>

        <div class="status-card">
            <div class="card-title">Last Quote Lag</div>
            <div class="card-value">
                {{ lag_seconds }}s
            </div>
        </div>



        <div class="status-card">
            <div class="card-title">Market Status</div>
            <div class="card-value
                {% if market_status == 'OPEN' %}
                    online
                {% else %}
                    offline
                {% endif %}
            ">
                {{ market_status }}
            </div>
            <div style="font-size: 13px; color: #666; margin-top: 10px;">
                {{ message }}
            </div>
        </div>







    </div>

</body>
</html>
