{% extends "base.html" %}

{% block extra_head %}
<meta http-equiv="refresh" content="10">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}

{% block content %}

<h1>Stock Charts</h1>

<div id="charts"></div>

<script>
const symbols = {{ settings["favorite_symbols"] | tojson }};

async function loadChart(symbol) {
    const response = await fetch(`/api/chart-data/${symbol}`);
    const data = await response.json();

    const canvas = document.createElement("canvas");
    document.getElementById("charts").appendChild(canvas);

    const ctx = canvas.getContext("2d");

    const prices = data.prices;
    const timestamps = data.timestamps;

    const alertPoints = data.alerts.map(a => {
        if (a.index === null || a.index === undefined) return null;

        return {
            x: a.index,
            y: prices[a.index],
        };
    }).filter(p => p !== null);

    new Chart(ctx, {
        type: "line",
        data: {
            labels: timestamps,
            datasets: [
                {
                    label: symbol,
                    data: prices,
                    borderWidth: 2,
                    tension: 0.2
                },
                {
                    label: "Alerts",
                    data: alertPoints,
                    pointRadius: 6,
                    showLine: false,
                }
            ]
        },
        options: {
            scales: {
                x: {
                    display: false
                }
            }
        }
    });
}

symbols.forEach(loadChart);
</script>

{% endblock %}
