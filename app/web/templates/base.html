<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #111827;
            color: #f3f4f6;
            margin: 0;
            padding: 0;
        }

        .main-nav {
            background: #1f2937;
            padding: 14px 20px;
            border-bottom: 1px solid #374151;
        }

        .main-nav a {
            color: #f3f4f6;
            text-decoration: none;
            margin-right: 20px;
            font-weight: 500;
            padding-bottom: 4px;
            transition: all 0.5s ease;
        }

        .main-nav a:hover {
            border-bottom: 2px solid #f3f4f6;
        }

        .main-nav a.active {
            border-bottom: 2px solid #f3f4f6;
            font-weight: 700;
        }

        .page-content {
            padding: 24px;
        }






        .card-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .status-card,
        .card {
            background: #1f2937;
            padding: 20px;
            width: 260px;
            border-radius: 10px;
            border: 1px solid #374151;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
            overflow-wrap: break-word;
        }

        .card-title {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 10px;
        }

        .card-value {
            font-size: 36px;
            font-weight: bold;
            line-height: 1.1;
            overflow-wrap: break-word;
        }

        .small-text {
            font-size: 13px;
            color: #d1d5db;
            margin-top: 10px;
            line-height: 1.5;
        }

        .tiny-text {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 5px;
            line-height: 1.4;
        }

        .online {
            color: #22c55e;
        }

        .offline {
            color: #ef4444;
        }


    </style>

</head>

<body>

    {% include "partials/nav.html" %}

    <div class="page-content">
        {% block content %}
        {% endblock %}
    </div>

</body>

</html>
