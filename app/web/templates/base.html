<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #111827;
            color: #f3f4f6;
            margin: 0;
            padding: 0;
        }

        .main-nav {
            background: #1f2937;
            padding: 14px 20px;
            border-bottom: 1px solid #374151;
        }

        .main-nav a {
            color: #f3f4f6;
            text-decoration: none;
            margin-right: 20px;
            font-weight: 500;
            padding-bottom: 4px;
            transition: all 0.5s ease;
        }

        .main-nav a:hover {
            border-bottom: 2px solid #f3f4f6;
        }

        .main-nav a.active {
            border-bottom: 2px solid #f3f4f6;
            font-weight: 700;
        }

        .page-content {
            padding: 24px;
        }






        .card-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .status-card,
        .card {
            background: #1f2937;
            padding: 20px;
            width: 260px;
            border-radius: 10px;
            border: 1px solid #374151;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
            overflow-wrap: break-word;
        }

        .card-title {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 10px;
        }

        .card-value {
            font-size: 36px;
            font-weight: bold;
            line-height: 1.1;
            overflow-wrap: break-word;
        }

        .small-text {
            font-size: 13px;
            color: #d1d5db;
            margin-top: 10px;
            line-height: 1.5;
        }

        .tiny-text {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 5px;
            line-height: 1.4;
        }

        .online {
            color: #22c55e;
        }

        .offline {
            color: #ef4444;
        }









        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
            background: #1f2937;
        }

        th,
        td {
            border: 1px solid #374151;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #111827;
        }

        tr:nth-child(even) {
            background: #273244;
        }

        button {
            padding: 8px 12px;
            border: 1px solid #374151;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }


        tr:hover {
            background: #334155;
        }














        input[type="text"],
        input[type="number"] {
            padding: 6px;
            margin: 5px 0;
            width: 300px;
            background: #1f2937;
            color: #f3f4f6;
            border: 1px solid #374151;
            border-radius: 4px;
        }

        input[type="checkbox"] {
            width: auto;
            margin-right: 8px;
        }







        
        pre {
            background: #111;
            color: #eee;
            padding: 15px;
            overflow-x: auto;
            max-height: 300px;
        }








        canvas {
            max-width: 900px;
            margin-bottom: 60px;
        }








.form-box {
    margin-top: 25px;
    padding: 15px;
    border: 1px solid #374151;
    border-radius: 8px;
    background: #1f2937;
    max-width: 700px;
}


form.inline {
    display: inline;
}
select {
    padding: 6px;
    margin: 5px;
    background: #1f2937;
    color: #f3f4f6;
    border: 1px solid #374151;
    border-radius: 4px;
}
.flash-message {
    padding: 12px;
    margin-bottom: 20px;
    border-radius: 8px;
    font-weight: bold;
}

.flash-message.success {
    background: #14532d;
    color: #dcfce7;
}

.flash-message.warning {
    background: #78350f;
    color: #fef3c7;
}

.flash-message.error {
    background: #7f1d1d;
    color: #fee2e2;
}

.badge {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: bold;
}

.badge-threshold {
    background: #1e3a8a;
    color: #dbeafe;
}

.badge-spike {
    background: #166534;
    color: #dcfce7;
}

.badge-drop {
    background: #991b1b;
    color: #fee2e2;
}

.badge-auto {
    background: #374151;
    color: #e5e7eb;
}

.badge-manual {
    background: #5b21b6;
    color: #ede9fe;
}

    </style>

    {% block extra_head %}
    {% endblock %}

</head>

<body>

    {% include "partials/nav.html" %}

    <div class="page-content">
        {% block content %}
        {% endblock %}
    </div>

    {% block extra_scripts %}
    {% endblock %}

</body>

</html>
