<!DOCTYPE html>
<html>
<head>
    <title>Stock Alert Dashboard</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }
        input {
            padding: 6px;
            margin: 5px 0;
            width: 300px;
        }
        button {
            padding: 8px 12px;
        }
        .section {
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<h1>Stock Alert Dashboard</h1>

<div class="section">
    <h2>Settings</h2>

    <form method="post" action="/settings">

        <label>Symbols (comma separated)</label><br>
        <input name="symbols" value="{{ settings['symbols'] | join(',') }}"><br>

        <label>Price Spike %</label><br>
        <input name="price_spike_pct" type="number" step="0.1" value="{{ settings['price_spike_pct'] }}"><br>

        <label>Volume Spike %</label><br>
        <input name="volume_spike_pct" type="number" step="0.1" value="{{ settings['volume_spike_pct'] }}"><br>

        <label>Window Size</label><br>
        <input name="window_size" type="number" value="{{ settings['window_size'] }}"><br>

        <label>Poll Seconds</label><br>
        <input name="poll_seconds" type="number" value="{{ settings['poll_seconds'] }}"><br><br>

        <button type="submit">Save Settings</button>

    </form>
</div>

</body>
</html>
